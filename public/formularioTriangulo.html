<!DOCTYPE html>
<html lang="pt-BR">
    <head>
    <meta charset="UTF-8">
    <title>Calcular Triangulo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center" style="min-height: 100vh; background-color: #07093d;">

  <div class="container" style="max-width: 480px;">
    <h1 class="text-primary text-center">Cálculo de Triângulo</h1>
    <h5 class="text-info text-center mb-4">Informe as três lados.</h5>

        <form action="/triangulos/perimetros" method="get" class="card p-4 text-white" style="background-color: #7b00bd;">

            <div class="mb-3">
                <label class="form-label">Lado A</label>
                <input type="text" name="txtLadoA" placeholder="Digite o valor do lado A" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Lado B</label>
                <input type="text" name="txtLadoB" placeholder="Digite o valor do lado B" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Lado C</label>
                <input type="text" name="txtLadoC" placeholder="Digite o valor do lado C" class="form-control">       
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">Verificar triângulo</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-info">Voltar ao menu</a>
        </div>
  </div>
</body>
</html>
