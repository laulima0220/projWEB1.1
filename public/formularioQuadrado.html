<!DOCTYPE html>
<html>

<head>
    <title>Formulários</title>
</head>

<body>
    <h1>Exemplo Quadrado</h1>
    <!-- 
        📚 Página simples com formulários HTML

        💡 Objetivo didático:
        - Mostrar como enviar dados para o backend (Slim)
        - Cada formulário chama uma rota diferente da API
    -->

    <div>
        <h2>Calculo de área</h2>
        <!-- 
            📐 Formulário para calcular ÁREA do quadrado

            action → define a rota que será chamada
            method="get" → envia dados pela URL

            Exemplo gerado:
            /quadrados/areas?txtLado=5
        -->
        <form action="/quadrados/areas" method="get">

            <!-- 
                Campo de entrada do usuário
                
                name="txtLado" → nome do parâmetro enviado para o backend
                placeholder → texto de ajuda para o usuário
            -->
            <input type="text" name="txtLado" placeholder="Digite o lado"><br>

            <!-- Botão que envia o formulário -->
            <input type="submit" value="Calcular área">
        </form>
    </div>

    <br>

    <div>
        <h2>Calculo de perímetro</h2>
        <!-- 
            📏 Formulário para calcular PERÍMETRO do quadrado

            Vai chamar a rota:
            /quadrados/perimetros
        -->
        <form action="/quadrados/perimetros" method="get">

            <!-- Mesmo campo, reutilizado para outro cálculo -->
            <input type="text" name="txtLado" placeholder="Digite o lado"><br>

            <input type="submit" value="Calcular perimetro">
        </form>
    </div>

</body>

</html>
