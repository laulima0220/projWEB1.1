<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Estoque de Produtos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center" style="min-height: 100vh; background-color: #07093d;">

  <div class="container" style="max-width: 720px;">

    <h1 class="text-primary text-center">Estoque de Loja</h1>
    <h5 class="text-info text-center mb-4">Cadastre os 5 produtos abaixo</h5>

    <form action="/produtos/estoques" method="get">

      <div class="row g-3 mb-3">

        <div class="col-6">
          <div class="card p-4 text-white" style="background-color: #7b00bd;">
            <h6 class="card-title mb-3">Produto 1</h6>
            <div class="mb-3">
              <label class="form-label">Nome do produto</label>
              <input type="text" name="txtNome1" placeholder="Nome produto" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Preço (R$)</label>
              <input type="text" name="txtPreco1" placeholder="Preço" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Quantidade em estoque</label>
              <input type="text" name="txtQtdE1" placeholder="Ex: 100" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Entrada de produtos</label>
              <input type="text" name="txtAddE1" placeholder="Ex: 20" class="form-control">
            </div>
            <div class="mb-0">
              <label class="form-label">Saída de produtos</label>
              <input type="text" name="txtDelE1" placeholder="Ex: 5" class="form-control">
            </div>
          </div>
        </div>

        <div class="col-6">
          <div class="card p-4 text-white" style="background-color: #7b00bd;">
            <h6 class="card-title mb-3">Produto 2</h6>
            <div class="mb-3">
              <label class="form-label">Nome do produto</label>
              <input type="text" name="txtNome2" placeholder="Nome produto" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Preço (R$)</label>
              <input type="text" name="txtPreco2" placeholder="Preço" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Quantidade em estoque</label>
              <input type="text" name="txtQtdE2" placeholder="Digite quantos há em estoque" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Entrada de produtos</label>
              <input type="text" name="txtAddE2" placeholder="Ex: 20" class="form-control">
            </div>
            <div class="mb-0">
              <label class="form-label">Saída de produtos</label>
              <input type="text" name="txtDelE2" placeholder="Ex: 5" class="form-control">
            </div>
          </div>
        </div>

        <div class="col-6">
          <div class="card p-4 text-white" style="background-color: #7b00bd;">
            <h6 class="card-title mb-3">Produto 3</h6>
            <div class="mb-3">
              <label class="form-label">Nome do produto</label>
              <input type="text" name="txtNome3" placeholder="Nome produto" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Preço (R$)</label>
              <input type="text" name="txtPreco3" placeholder="Preço" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Quantidade em estoque</label>
              <input type="text" name="txtQtdE3" placeholder="Digite quantos há em estoque" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Entrada de produtos</label>
              <input type="text" name="txtAddE3" placeholder="Ex: 20" class="form-control">
            </div>
            <div class="mb-0">
              <label class="form-label">Saída de produtos</label>
              <input type="text" name="txtDelE3" placeholder="Ex: 5" class="form-control">
            </div>
          </div>
        </div>

        <div class="col-6">
          <div class="card p-4 text-white" style="background-color: #7b00bd;">
            <h6 class="card-title mb-3">Produto 4</h6>
            <div class="mb-3">
              <label class="form-label">Nome do produto</label>
              <input type="text" name="txtNome4" placeholder="Nome produto" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Preço (R$)</label>
              <input type="text" name="txtPreco4" placeholder="Preço" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Quantidade em estoque</label>
              <input type="text" name="txtQtdE4" placeholder="Digite quantos há em estoque" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Entrada de produtos</label>
              <input type="text" name="txtAddE4" placeholder="Ex: 20" class="form-control">
            </div>
            <div class="mb-0">
              <label class="form-label">Saída de produtos</label>
              <input type="text" name="txtDelE4" placeholder="Ex: 5" class="form-control">
            </div>
          </div>
        </div>

        <div class="col-6">
          <div class="card p-4 text-white" style="background-color: #7b00bd;">
            <h6 class="card-title mb-3">Produto 5</h6>
            <div class="mb-3">
              <label class="form-label">Nome do produto</label>
              <input type="text" name="txtNome5" placeholder="Nome produto" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Preço (R$)</label>
              <input type="text" name="txtPreco5" placeholder="Preço" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Quantidade em estoque</label>
              <input type="text" name="txtQtdE5" placeholder="Digite quantos há em estoque" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Entrada de produtos</label>
              <input type="text" name="txtAddE5" placeholder="Ex: 20" class="form-control">
            </div>
            <div class="mb-0">
              <label class="form-label">Saída de produtos</label>
              <input type="text" name="txtDelE5" placeholder="Ex: 5" class="form-control">
            </div>
          </div>
        </div>

      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">Calcular estoque</button>

    </form>

    <div class="text-center mt-3">
      <a href="/" class="text-info">← Voltar ao menu</a>
    </div>

  </div>

</body>
</html>
