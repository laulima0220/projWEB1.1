<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calcular Salário</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center" style="min-height: 100vh; background-color: #07093d;">

  <div class="container" style="max-width: 480px;">

    <h1 class="text-primary text-center">Salário de Funcionário</h1>
    <h5 class="text-info text-center mb-4">Informe os dados abaixo</h5>

    <form action="/funcionarios/salarios" method="get" class="card p-4 text-white" style="background-color: #7b00bd;">

      <div class="mb-3">
        <label class="form-label">Nome do funcionário</label>
        <input type="text" name="txtNome" placeholder="Digite o nome" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Valor da hora trabalhada (R$)</label>
        <input type="text" name="txtvalorHora" placeholder="Ex: 15.00" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Valor da hora extra (R$)</label>
        <input type="text" name="txtvalorHoraExtra" placeholder="Ex: 22.50" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Quantidade de horas trabalhadas</label>
        <input type="text" name="txtqtdHoras" placeholder="Ex: 160" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Quantidade de horas extras</label>
        <input type="text" name="txtqtdHorasExtras" placeholder="Ex: 10" class="form-control">
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">Ver salário</button>

    </form>

    <div class="text-center mt-3">
      <a href="/" class="text-info">← Voltar ao menu</a>
    </div>

  </div>

</body>
</html>
