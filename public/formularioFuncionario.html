<!DOCTYPE html>
<html lang="pt-BR">
    <head>
    <meta charset="UTF-8">
    <title>Calcular IMC</title>
</head>
    <body>
        <form action="/funcionarios/salarios" method="get">    
            <input type="text" name="txtNome" placeholder="Nome do funcionário"><br>
            <input type="text" name="txtvalorHora" placeholder="Digite quanto vale a hora trabalhada"><br>
            <input type="text" name="txtvalorHoraExtra" placeholder="Digite quanto vale a hora extra trabalhada"><br>
            <input type="text" name="txtqtdHoras" placeholder="Digite a quantidade de horas trabalhadas"><br>
            <input type="text" name="txtqtdHorasExtras" placeholder="Digite a quantidade de horas extras trabalhadas"><br>

            <input type="submit" value="Ver salário">
        </form>

    </body>
</html>
